name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts (compile + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: npx hardhat compile
      - name: Run unit tests
        run: npx hardhat test test/AgentDID.test.js test/AuditLog.test.js test/Reputation.test.js
      - name: Coverage
        run: npx hardhat coverage || true

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Type check + build
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend (lint + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agents/package-lock.json
      - name: Install backend deps
        working-directory: agents
        run: npm ci || npm install
      - name: Syntax check
        working-directory: agents
        run: |
          node -c api-server.js
          node -c router-agent.js
          node -c worker-agent.js
          node -c worker-agents.js
          node -c reputation-analyzer.js
          node -c siliconflow-client.js
          node -c ../shared/abis.js
